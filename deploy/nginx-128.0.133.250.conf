# Готовый vhost под публичный IP (без домена).
# Слушает только порт 5173 — на роутере проброс WAN → 5173/tcp.
# Не запускай одновременно с npm run dev на этом же ПК (тот же порт).
#
# default_server — чтобы сработало при любом Host (в т.ч. с :5173 в заголовке).
#
# Установка: ./deploy/install.sh 128.0.133.250

upstream socrates_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 5173 default_server;
    listen [::]:5173 default_server;
    server_name 128.0.133.250;

    root /var/www/socrates/dist;
    index index.html;

    access_log /var/log/nginx/socrates-access.log;
    error_log /var/log/nginx/socrates-error.log warn;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /api/ {
        proxy_pass http://socrates_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
